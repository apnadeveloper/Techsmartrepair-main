        :root {
            --primary-color: #FF138B;
            /* Bright pink */
            --secondary-color: #c10f6b;
            /* Darker pink */
            --light-pink: #ffebf6;
            /* Light pink background */
            --light-color: #f8f9fa;
            --dark-color: #212529;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--dark-color);
            line-height: 1.6;
        }

        /* Header Styles */
        .iphone-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 5rem 0 4rem;
            margin-bottom: 3rem;
            position: relative;
            overflow: hidden;
        }

        .iphone-header::before {
            content: "";
            position: absolute;
            top: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .iphone-header::after {
            content: "";
            position: absolute;
            bottom: -80px;
            left: -30px;
            width: 250px;
            height: 250px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        /* Product Card Styles */
        .iphone-card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            margin-bottom: 2rem;
            overflow: hidden;
            border-top: 4px solid var(--primary-color);
        }

        .iphone-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(255, 19, 139, 0.15);
        }

        .iphone-img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            padding: 1rem;
            background-color: var(--light-color);
        }

        /* Button Styles */
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #e0127d, #a00d5a);
        }

        /* Repair Detail Page Styles */
        .repair-section {
            background-color: #fff;
            padding: 40px 0;
            border-radius: 10px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .repair-header {
            margin-bottom: 20px;
            text-align: center;
        }

        .repair-header h2 {
            color: #333;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .repair-header h3 {
            color: var(--primary-color);
            font-weight: 600;
        }

        .repair-card {
            background: var(--light-pink);
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            height: 100%;
            transition: all 0.3s ease;
            border: 1px solid #eee;
            margin-top: 10px;
        }

        .repair-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(255, 19, 139, 0.15);
        }

        .repair-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }

        .repair-price {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 25px;
            text-align: center;
        }

        .spec-item {
            margin-bottom: 12px;
            padding-bottom: 12px;
            text-align: center;
            border-bottom: 1px solid var(--primary-color);
        }

        .spec-value {
            color: #333;
            font-weight: 500;
        }

        .highlight-card {
            border: 2px solid var(--secondary-color);
            position: relative;
            background-color: var(--light-pink);
        }

        .highlight-badge {
            position: absolute;
            top: -12px;
            right: 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(255, 19, 139, 0.3);
        }

        /* Back Button */
        .back-btn {
            margin-bottom: 30px;
            background: none;
            border: none;
            color: var(--primary-color);
            font-weight: 600;
            cursor: pointer;
        }

        .back-btn:hover {
            color: var(--secondary-color);
        }

        /* Additional Services Styles */
        .additional-services {
            margin-top: 50px;
            padding: 30px 0;
        }

        .service-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            border-left: 4px solid var(--primary-color);
        }

        .service-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 19, 139, 0.1);
        }

        .service-title {
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .service-price {
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        .service-icon {
            margin-right: 10px;
            color: var(--primary-color);
            font-size: 1.2rem;
        }

        .btn-add-to-cart {
            background: #c10f6b;
            color: white;
            border: 1px solid var(--primary-color);
            padding: 5px 15px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .btn-add-to-cart:hover {
            background: var(--primary-color);
            color: white;
        }

        /* Booking Modal Styles */
        .booking-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1050;
            overflow-y: auto;
        }

        .booking-modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 25px rgba(255, 19, 139, 0.3);
            max-width: 600px;
            width: 90%;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 1.5rem;
            color: var(--primary-color);
            cursor: pointer;
            background: none;
            border: none;
        }

        .modal-header {
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .modal-title {
            color: var(--primary-color);
            font-weight: 700;
        }

        .form-label {
            font-weight: 600;
        }

        .form-control {
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ddd;
            padding: 10px 15px;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(255, 19, 139, 0.25);

            border: none;
            padding: 12px 25px;
            border-radius: 5px;

            margin-top: 15px;

            margin-bottom: 20px;

        // Show homepage with all iPhones
        function showHomePage() {
            document.title = "xiaomi Repairs | Smart Tech";
            window.history.pushState({}, '', '/');

            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = `
                <!-- Header -->
                <header class="iphone-header text-center">
                    <div class="container position-relative">
                        <h1 class="display-4 fw-bold mb-3">xiaomi Repairs</h1>
                        <p class="lead mb-0">Expert repairs for all xiaomi models</p>
                    </div>
                </header>

                <!-- Product Grid -->
                <main class="container mb-5">
                    <div class="row">
                        ${Object.entries(iphones).map(([id, product]) => `
                            <div class="col-md-6 col-lg-4 col-xl-3 mb-4">
                                <div class="iphone-card h-100">
                                    <img src="${product.image}" class="iphone-img" alt="${product.title}">
                                    <div class="card-body text-center">
                                        <h3 class="h5 mb-3">${product.title}</h3>
                                        <div class="d-grid">
                                            <button class="btn btn-primary" onclick="showProductDetail('${id}')">View Options</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </main>
            `;

            // Animate cards on scroll
            animateCards();
        }

        // Show product detail page
        function showProductDetail(productId) {
            const product = iphones[productId];
            if (!product) return;

            document.title = `${product.title} Repairs | Smart Tech`;
            window.history.pushState({}, '', `#${productId}`);

            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = `
                <button class="back-btn" onclick="showHomePage()">
                    <i class="fas fa-arrow-left me-2"></i>Back to All iPhones
                </button>
                
                <div class="repair-section">
                    <div class="repair-header">
                       
                        <h3 class="fw-bold">Repairing Details</h3>
                    </div>
                    
                    <div class="row g-4">
                        <!-- Specifications Column -->
                        <div class="col-md-3">
                            <div class="repair-card border-0" style="background-color: #ffffff; box-shadow: none;">
                                <div class="repair-title pt-1">
                                    <p class="fw-bold" style="color:var(--primary-color);"> <br>Screen Replacement</p>
                                </div>

                                ${Object.keys(product.options[0].specs).map(spec => `
                                    <div class="spec-item">
                                        <div class="spec-value fw-bold">${spec}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <!-- Product Options -->
                        ${product.options.map((option, index) => `
                            <div class="col-md-3">
                                <div class="repair-card ${index === 2 ? 'highlight-card' : ''}" 
                                    style="background-color: ${index === 2 ? 'var(--light-pink)' : '#ffffff'};">
                                    ${index === 2 ? '<div class="highlight-badge">Popular</div>' : ''}
                                    <div class="repair-title">${option.name}</div>
                                    <div class="repair-price">${option.price}</div>
                                    
                                    ${Object.values(option.specs).map(value => `
                                        <div class="spec-item">
                                            <div class="spec-value">${value}</div>
                                        </div>
                                    `).join('')}
                                    
                                    <button class="btn btn-primary mt-3 px-4 btn-book" 
                                        onclick="openBookingModal('${product.title}', '${option.name} Screen Replacement', '${option.price}')">
                                        Book Now
                                    </button>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <!-- Additional Services Section -->
                    <div class="additional-services">
                        <h3 class="text-center mb-4" style="color: var(--primary-color);">Additional Services</h3>
                        <div class="row">
                            <!-- Model-specific services -->
                            ${product.additionalServices ? product.additionalServices.map(service => `
                                <div class="col-md-6 col-lg-4 col-xl-3">
                                    <div class="service-card">
                                        <div class="service-title">
                                            <i class="bi ${service.icon} service-icon"></i>
                                            ${service.title}
                                        </div>
                                        <div class="service-price">${service.price}</div>
                                        <p class="small text-muted mb-2">${service.description}</p>
                                        <button class="btn btn-add-to-cart w-100" 
                                            onclick="openBookingModal('${product.title}', '${service.title}', '${service.price}')">
                                            Book Now
                                        </button>
                                    </div>
                                </div>
                            `).join('') : ''}
                          
                        </div>
                    </div>
                </div>
            `;
        }

        // Open booking modal with specific product details
        function openBookingModal(device, plan, price) {
            document.getElementById('modalDevice').textContent = device;
            document.getElementById('modalPlan').textContent = plan;
            document.getElementById('modalPrice').textContent = price;

            // Set hidden form values
            document.getElementById('hiddenDevice').value = device;
            document.getElementById('hiddenPlan').value = plan;
            document.getElementById('hiddenPrice').value = price;

            const modal = document.getElementById('bookingModal');
            modal.style.display = 'block';

            // Set minimum date to today
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').min = today;
        }

        // Close booking modal
        function closeBookingModal() {
            document.getElementById('bookingModal').style.display = 'none';
        }

        // Handle booking form submission
        function handleBookingSubmit(event) {
            event.preventDefault();

            // Show confirmation
            const plan = document.getElementById('modalPlan').textContent;
            const price = document.getElementById('modalPrice').textContent;
            showBookingAlert(plan, price);

            // Submit the form
            event.target.submit();

            // Close modal and reset form
            closeBookingModal();
            document.getElementById('bookingForm').reset();
        }

        // Show booking confirmation alert
        function showBookingAlert(planTitle, price) {
            const alertBox = document.createElement('div');
            alertBox.style.position = 'fixed';
            alertBox.style.top = '50%';
            alertBox.style.left = '50%';
            alertBox.style.transform = 'translate(-50%, -50%)';
            alertBox.style.backgroundColor = 'white';
            alertBox.style.padding = '30px';
            alertBox.style.borderRadius = '10px';
            alertBox.style.boxShadow = '0 5px 25px rgba(255, 19, 139, 0.3)';
            alertBox.style.zIndex = '1000';
            alertBox.style.textAlign = 'center';
            alertBox.style.maxWidth = '400px';
            alertBox.style.width = '90%';

            alertBox.innerHTML = `
                <h4 style="color: var(--primary-color); margin-bottom: 20px;">Booking Confirmation</h4>
                <p>You've selected the <strong>${planTitle}</strong> plan for ${price}.</p>
                <p style="margin-bottom: 25px;">Our team will contact you shortly to confirm your appointment.</p>
                <button id="closeAlert" style="background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); 
                    color: white; border: none; padding: 10px 25px; border-radius: 5px; 
                    cursor: pointer; font-weight: 600;">Continue</button>
            `;

            document.body.appendChild(alertBox);

            document.getElementById('closeAlert').addEventListener('click', function () {
                document.body.removeChild(alertBox);
            });
        }

        // Animate cards on scroll
        function animateCards() {
            const cards = document.querySelectorAll('.iphone-card');
            cards.forEach(card => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(20px)';
                card.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
            });

            const animateOnScroll = function () {
                cards.forEach(card => {
                    const cardPosition = card.getBoundingClientRect().top;
                    const screenPosition = window.innerHeight / 1.3;

                    if (cardPosition < screenPosition) {
                        card.style.opacity = '1';
                        card.style.transform = 'translateY(0)';
                    }
                });
            };

            animateOnScroll();
            window.addEventListener('scroll', animateOnScroll);
        }

        // Handle page load and navigation
        function handleNavigation() {
            const hash = window.location.hash.substring(1);

            if (hash && iphones[hash]) {
                showProductDetail(hash);
            } else {
                showHomePage();
            }
        }

        // Initialize the application
        document.addEventListener('DOMContentLoaded', function () {
            handleNavigation();

            // Set up modal event listeners
            document.querySelector('.close-modal').addEventListener('click', closeBookingModal);
            document.getElementById('bookingForm').addEventListener('submit', handleBookingSubmit);

            // Close modal when clicking outside
            window.addEventListener('click', function (event) {
                const modal = document.getElementById('bookingModal');
                if (event.target === modal) {
                    closeBookingModal();
                }
            });
        });
        window.addEventListener('popstate', handleNavigation);
    </script>
