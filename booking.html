    <script>
  document.getElementById("bookingForm").addEventListener("submit", function (e) {
    e.preventDefault();

    // Remove previous error highlights
    document.querySelectorAll(".is-invalid").forEach(el => el.classList.remove("is-invalid"));

    // Show loading state
    const submitBtn = document.getElementById("submitBtn");
    const submitText = document.getElementById("submitText");
    const submitSpinner = document.getElementById("submitSpinner");

    submitText.classList.add("d-none");
    submitSpinner.classList.remove("d-none");
    submitBtn.disabled = true;

    // Show form message alert
    const formMessage = document.getElementById("formMessage");
    const messageText = document.getElementById("messageText");
    formMessage.classList.add("d-none");

    // Collect form data
    const formData = new FormData(this);

    // Send data via Fetch API
    fetch("process_booking.php", {
      method: "POST",
      body: formData
    })
    .then(response => response.json())
    .then(data => {
      console.log("Server Response:", data); // Debugging log

      if (data.success) {
        // Show success message
        formMessage.classList.remove("alert-danger");
        formMessage.classList.add("alert-success");
        formMessage.classList.remove("d-none");
        messageText.textContent = data.message;

        // Reset form
        document.getElementById("bookingForm").reset();

        // Hide message after 5 seconds
        setTimeout(() => {
          formMessage.classList.add("d-none");
        }, 5000);
      } else {
        // Show error messages
        if (data.errors) {
          for (const [field, message] of Object.entries(data.errors)) {
            const input = document.getElementById(field);
            if (input) {
              input.classList.add("is-invalid");
              let feedback = input.nextElementSibling;
              while (feedback && !feedback.classList.contains("invalid-feedback")) {
                feedback = feedback.nextElementSibling;
              }
              if (feedback) {
                feedback.textContent = message;
              }
            }
          }
        }

        // Show general error
        if (data.message) {
          formMessage.classList.remove("alert-success");
          formMessage.classList.add("alert-danger");
          formMessage.classList.remove("d-none");
          messageText.textContent = data.message;
        }
      }
    })
    .catch(error => {
      console.error("Error:", error);
      formMessage.classList.remove("alert-success");
      formMessage.classList.add("alert-danger");
      formMessage.classList.remove("d-none");
      messageText.textContent = "An error occurred while submitting the form. Please try again later.";
    })
    .finally(() => {
      submitText.classList.remove("d-none");
      submitSpinner.classList.add("d-none");
      submitBtn.disabled = false;

      // Scroll to message if exists
      if (!formMessage.classList.contains("d-none")) {
        formMessage.scrollIntoView({ behavior: "smooth", block: "center" });
      }
    });
  });
</script>
