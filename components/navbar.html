<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Enhanced viewport meta for iOS devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   
    <!-- iOS Optimization CSS -->
    <style>
         .navbar{
            border-bottom: 5px inset #c10f6b;
             border-bottom-right-radius: 20px;
            border-bottom-left-radius: 20px; 
            /* border-radius: 80px; */
            padding:5px 10px 5px 10px;
            
         }
        /* Safari-specific fixes */
        @supports (-webkit-touch-callout: none) {
            .navbar {
                padding-top: env(safe-area-inset-top);
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
            
            .navbar-toggler {
                margin-right: env(safe-area-inset-right);
            }
            
            .navbar-collapse {
                padding-bottom: env(safe-area-inset-bottom);
            }
            
            /* Prevent zoom on focus */
            .nav-link {
                font-size: 16px;
            }
        }
        
        /* Better mobile menu transitions */
        .navbar-collapse {
            transition: all 0.3s ease;
        }
        
        /* Logo optimization */
        .navbar-brand img {
            max-width: 200px;
            height: auto;
            transition: all 0.3s ease;
        }
        
        @media (max-width: 768px) {
            .navbar-brand img {
                max-width: 160px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white fixed-top shadow-lg border-bottom-radius-50">
        <div class="container-fluid px-lg-4 px-md-3 px-sm-2">
            <!-- Optimized logo -->
            <a class="navbar-brand" href="/index.html">
                <img src="/Images/logo.png" 
                     alt="Company Logo" 
                     class="img-fluid"
                     loading="lazy"
                     decoding="async">
            </a>
            
            <!-- Enhanced mobile toggle -->
            <button class="navbar-toggler border-0 py-2" 
                    type="button" 
                    data-bs-toggle="collapse" 
                    data-bs-target="#navbarNav" 
                    aria-controls="navbarNav" 
                    aria-expanded="false" 
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <!-- Navigation items -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link text-black fw-medium px-3 py-2 py-lg-1" href="/index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-black fw-medium px-3 py-2 py-lg-1" href="/repair.html">Repairing</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-black fw-medium px-3 py-2 py-lg-1" href="/sellbuy.html">Sell & Buy Your Device</a>
                    </li>
                    <!-- <li class="nav-item">
                        <a class="nav-link text-black fw-medium px-3 py-2 py-lg-1" href="#">New & Pre-owned phones</a>
                    </li> -->
                    <li class="nav-item">
                        <a class="nav-link text-black fw-medium px-3 py-2 py-lg-1" href="/offers.html">Offers</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-black fw-medium px-3 py-2 py-lg-1" href="/storelocation.html">Store Locator</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-black fw-medium px-3 py-2 py-lg-1" href="/team.html">Join our Team</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- iOS Enhancements -->
    <script>
        // Fix touch delay
        document.addEventListener('touchstart', function() {}, true);
        
        // Close menu when clicking outside on mobile
        document.addEventListener('click', function(e) {
            const nav = document.getElementById('navbarNav');
            if(window.innerWidth < 992 && !e.target.closest('.navbar')) {
                bootstrap.Collapse.getInstance(nav)?.hide();
            }
        });
        
        // Prevent horizontal scroll on menu open
        document.getElementById('navbarNav').addEventListener('show.bs.collapse', function() {
            document.body.style.overflowX = 'hidden';
        });
    </script>
</body>
</html>
