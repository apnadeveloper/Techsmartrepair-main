    <style>
        :root {
            --primary-color: #FF138B; /* Bright pink */
            --secondary-color: #c10f6b; /* Darker pink */
            --light-pink: #ffebf6; /* Light pink background */
            --light-color: #f8f9fa;
            --dark-color: #212529;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--dark-color);
            line-height: 1.6;
        }
        
        /* Header Styles */
        .tablet-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 5rem 0 4rem;
            margin-bottom: 3rem;
            position: relative;
            overflow: hidden;
        }
        
        .tablet-header::before {
            content: "";
            position: absolute;
            top: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }
        
        .tablet-header::after {
            content: "";
            position: absolute;
            bottom: -80px;
            left: -30px;
            width: 250px;
            height: 250px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }
        
        /* Product Card Styles */
        .tablet-card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            margin-bottom: 2rem;
            overflow: hidden;
            border-top: 4px solid var(--primary-color);
        }
        
        .tablet-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(255, 19, 139, 0.15);
        }
        
        .tablet-img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            padding: 1rem;
            background-color: var(--light-color);
        }
        
        /* Button Styles */
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #e0127d, #a00d5a);
        }
        
        /* Repair Detail Page Styles */
        .repair-section {
            background-color: #fff;
            padding: 40px 0;
            border-radius: 10px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .repair-header {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .repair-header h2 {
            color: #333;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .repair-header h3 {
            color: var(--primary-color);
            font-weight: 600;
        }
        
        .repair-card {
            background: var(--light-pink);
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            height: 100%;
            transition: all 0.3s ease;
            border: 1px solid #eee;
            margin-top: 50px;
        }
        
        .repair-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(255, 19, 139, 0.15);
        }
        
        .repair-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }
        
        .repair-price {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 25px;
            text-align: center;
        }
        
        .spec-item {
            margin-bottom: 12px;
            padding-bottom: 12px;
            text-align: center;
            border-bottom: 1px solid var(--primary-color);
        }
        
        .spec-value {
            color: #333;
            font-weight: 500;
        }
        
        .highlight-card {
            border: 2px solid var(--secondary-color);
            position: relative;
            background-color: var(--light-pink);
        }
        
        .highlight-badge {
            position: absolute;
            top: -12px;
            right: 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(255, 19, 139, 0.3);
        }
        
        /* Back Button */
        .back-btn {
            margin-bottom: 30px;
            background: none;
            border: none;
            color: var(--primary-color);
            font-weight: 600;
            cursor: pointer;
        }
        
        .back-btn:hover {
            color: var(--secondary-color);
        }
        
        /* Additional Services Styles */
        .additional-services {
            margin-top: 50px;
            padding: 30px 0;
        }
        
        .service-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            border-left: 4px solid var(--primary-color);
        }
        
        .service-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 19, 139, 0.1);
        }
        
        .service-title {
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }
        
        .service-price {
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 15px;
        }
        
        .service-icon {
            margin-right: 10px;
            color: var(--primary-color);
            font-size: 1.2rem;
        }
        
        .btn-add-to-cart {
            background: #c10f6b;
            color:white;
            border: 1px solid var(--primary-color);
            padding: 5px 15px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        
        .btn-add-to-cart:hover {
            background: var(--primary-color);
            color: white;
        }
        
        /* Booking Modal Styles */
        .booking-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1050;
            overflow-y: auto;
        }
        
        .booking-modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 25px rgba(255, 19, 139, 0.3);
            max-width: 600px;
            width: 90%;
            position: relative;
        }
        
        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 1.5rem;
            color: var(--primary-color);
            cursor: pointer;
            background: none;
            border: none;
        }
        
        .modal-header {
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        
        .modal-title {
            color: var(--primary-color);
            font-weight: 700;
        }
        
        .form-label {
            font-weight: 600;
        }
        
        .form-control {
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ddd;
            padding: 10px 15px;
        }
        
        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(255, 19, 139, 0.25);
        }
        
        .submit-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            font-weight: 600;
            width: 100%;
            margin-top: 15px;
            transition: all 0.3s ease;
        }
        
        .submit-btn:hover {
            background: linear-gradient(135deg, #e0127d, #a00d5a);
            transform: translateY(-2px);
        }
        
        .booking-summary {
            background-color: var(--light-pink);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .summary-title {
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 15px;

            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

            font-weight: 600;
        }
        
        /* Responsive Styles */
        @media (max-width: 768px) {
            .tablet-header {

            }

                font-size: 2.2rem;
            }
            
            .tablet-img {
                height: 150px;
            }
            
            .repair-card {
                margin-bottom: 20px;
            }
            
            .booking-modal-content {
                margin: 10% auto;
            }
        }
    </style>
</head>

    <!-- Navbar loaded via JavaScript -->

    </div>

    <!-- Booking Modal -->
    <div id="bookingModal" class="booking-modal">
        <div class="booking-modal-content">
            <button class="close-modal">&times;</button>
            <div class="modal-header">
                <h3 class="modal-title">Book Your Repair</h3>
            </div>
            <div class="booking-summary">
                <h5 class="summary-title">Repair Summary</h5>
                <div class="summary-item">
                    <span class="summary-label">Device:</span>
                    <span id="modalDevice">iPad Pro 12.9"</span>
                </div>
                <div class="summary-item">
                    <span class="summary-label">Repair Plan:</span>
                    <span id="modalPlan">Premium Screen Replacement</span>
                </div>
                <div class="summary-item">
                    <span class="summary-label">Price:</span>
                    <span id="modalPrice">£349.00</span>
                </div>
            </div>
            <form id="bookingForm" action="https://formsubmit.co/info@techsmartrepair.co.uk" method="POST">
                <input type="hidden" name="_subject" value="New Repair Booking">
                <input type="hidden" name="_template" value="table">
                <input type="hidden" name="_next" value="#">
                <div class="mb-3">
                    <label for="name" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" id="phone" name="phone" required>
                </div>
                <div class="mb-3">
                    <label for="date" class="form-label">Preferred Appointment Date</label>
                    <input type="date" class="form-control" id="date" name="date" required>
                </div>
                <div class="mb-3">
                    <label for="time" class="form-label">Preferred Time</label>
                    <select class="form-control" id="time" name="time" required>
                        <option value="">Select a time</option>
                        <option value="09:00-12:00">Morning (9:00 AM - 12:00 PM)</option>
                        <option value="12:00-15:00">Afternoon (12:00 PM - 3:00 PM)</option>
                        <option value="15:00-18:00">Evening (3:00 PM - 6:00 PM)</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="notes" class="form-label">Additional Notes</label>
                    <textarea class="form-control" id="notes" name="notes" rows="3"></textarea>
                </div>
                <input type="hidden" id="hiddenDevice" name="device">
                <input type="hidden" id="hiddenPlan" name="plan">
                <input type="hidden" id="hiddenPrice" name="price">
                <button type="submit" class="submit-btn">Book Now</button>
            </form>
        </div>
    </div>

        // Show homepage with all tablets

        // Open booking modal with specific product details
        function openBookingModal(device, plan, price) {
            document.getElementById('modalDevice').textContent = device;
            document.getElementById('modalPlan').textContent = plan;
            document.getElementById('modalPrice').textContent = price;
            
            // Set hidden form values
            document.getElementById('hiddenDevice').value = device;
            document.getElementById('hiddenPlan').value = plan;
            document.getElementById('hiddenPrice').value = price;
            
            const modal = document.getElementById('bookingModal');
            modal.style.display = 'block';
            
            // Set minimum date to today
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').min = today;
        }

        // Close booking modal
        function closeBookingModal() {
            document.getElementById('bookingModal').style.display = 'none';
        }

        // Handle booking form submission
        function handleBookingSubmit(event) {
            event.preventDefault();
            
            // Show confirmation
            const plan = document.getElementById('modalPlan').textContent;
            const price = document.getElementById('modalPrice').textContent;
            showBookingAlert(plan, price);
            
            // Submit the form
            event.target.submit();
            
            // Close modal and reset form
            closeBookingModal();
            document.getElementById('bookingForm').reset();
        }

        // Show booking confirmation alert
        function showBookingAlert(planTitle, price) {
            const alertBox = document.createElement('div');
            alertBox.style.position = 'fixed';
            alertBox.style.top = '50%';
            alertBox.style.left = '50%';
            alertBox.style.transform = 'translate(-50%, -50%)';
            alertBox.style.backgroundColor = 'white';
            alertBox.style.padding = '30px';
            alertBox.style.borderRadius = '10px';
            alertBox.style.boxShadow = '0 5px 25px rgba(255, 19, 139, 0.3)';
            alertBox.style.zIndex = '1000';
            alertBox.style.textAlign = 'center';
            alertBox.style.maxWidth = '400px';
            alertBox.style.width = '90%';

            alertBox.innerHTML = `
                <h4 style="color: var(--primary-color); margin-bottom: 20px;">Booking Confirmation</h4>
                <p>You've selected the <strong>${planTitle}</strong> plan for ${price}.</p>
                <p style="margin-bottom: 25px;">Our team will contact you shortly to confirm your appointment.</p>
                <button id="closeAlert" style="background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); 
                    color: white; border: none; padding: 10px 25px; border-radius: 5px; 
                    cursor: pointer; font-weight: 600;">Continue</button>
            `;

            document.body.appendChild(alertBox);

            document.getElementById('closeAlert').addEventListener('click', function() {
                document.body.removeChild(alertBox);
            });
        }

        // Animate cards on scroll
        function animateCards() {
            const cards = document.querySelectorAll('.tablet-card');
            cards.forEach(card => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(20px)';
                card.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
            });
            
            const animateOnScroll = function() {
                cards.forEach(card => {
                    const cardPosition = card.getBoundingClientRect().top;
                    const screenPosition = window.innerHeight / 1.3;
                    
                    if (cardPosition < screenPosition) {
                        card.style.opacity = '1';
                        card.style.transform = 'translateY(0)';
                    }
                });
            };
            
            animateOnScroll();
            window.addEventListener('scroll', animateOnScroll);
        }

        // Handle page load and navigation
        function handleNavigation() {
            const hash = window.location.hash.substring(1);
            
            if (hash && tablets[hash]) {
                showProductDetail(hash);
            } else {
                showHomePage();
            }
        }

        // Initialize the application
        document.addEventListener('DOMContentLoaded', function() {
            handleNavigation();
            
            // Set up modal event listeners
            document.querySelector('.close-modal').addEventListener('click', closeBookingModal);
            document.getElementById('bookingForm').addEventListener('submit', handleBookingSubmit);
            
            // Close modal when clicking outside
            window.addEventListener('click', function(event) {
                const modal = document.getElementById('bookingModal');
                if (event.target === modal) {
                    closeBookingModal();
                }
            });
        });
        
        window.addEventListener('popstate', handleNavigation);
    </script>
